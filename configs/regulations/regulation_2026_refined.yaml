# F1 2026 Refined Regulations
# Status: synthetic/experimental - refined based on initial analysis

name: regulation_2026_refined
version: "2026-refined"
status: synthetic

power_unit:
  architecture: hybrid_v6turbo
  max_power_kw: 750
  max_rpm: 15000
  max_fuel_flow_kg_h: 100
  fuel_capacity_kg: 105
  ers_max_energy_mj: 6.0
  ers_deployment_max_kw: 250
  mgu_k_max_power_kw: 250
  mgu_h_max_power_kw: 300

active_aero:
  enabled: true
  modes:
    - corner
    - straight
    - drs
  transition_time_s: 0.3
  drag_reduction_max_cda_m2: 0.10
  penalties:
    too_many_transitions: 5
    invalid_mode: 10

aero:
  active_aero: true
  drs_zones: 1
  drs_delta_min_s: 0.6
  overtake_mode:
    enabled: true
    activation_gap_s: 1.5
    boost_duration_s: 3.0
    boost_energy_mj: 1.5
    cooldown_time_s: 15.0

tyres:
  compounds: ["C0", "C1", "C2", "C3", "C4", "C5"]
  max_pressures_psi: 27.0
  min_pressures_psi: 17.5
  pit_stop_min_time_s: 2.0

safety:
  max_closing_speed_kph: 55
  min_grid_slots: 20
  max_race_distance_km: 305
  max_allowed_closing_speed_delta_kph: 55
  monitoring:
    ers_deployment_logging: true
    closing_speed_alerts: true

weights:
  min_total_mass_kg: 780
  min_driver_mass_kg: 80

sessions:
  quali_format: knockout
  sprint_sessions: 3
  parcourse_rules: true

mitigations:
  - "Reduced ERS max deployment to prevent battery dominance"
  - "Added cooldown to prevent boost spam"
  - "Increased activation gap to prevent artificial passes"
  - "Monitoring system for closing speed violations"
  - "Higher minimum mass for balanced performance"