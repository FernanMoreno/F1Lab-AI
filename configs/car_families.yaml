# Synthetic F1 Car Families
# These are NOT real team cars - they are synthetic archetypes for regulation testing

car_families:
  low_drag_missile:
    description: High straight-line speed, low downforce - Monza specialist
    mass_kg: 768
    cda_straight_m2: 0.82
    cda_corner_m2: 1.12
    cla_straight_m2: 2.1
    cla_corner_m2: 3.5
    power_kw: 750
    ers_efficiency: 0.70
    tyre_deg_factor: 1.05
    dirty_air_sensitivity: 0.12
    strength: ["top_speed", "straight_line"]
    weakness: ["cornering", "tyre_wear"]

  high_downforce_stable:
    description: Maximum downforce, stable in corners - Barcelona specialist
    mass_kg: 770
    cda_straight_m2: 0.95
    cda_corner_m2: 1.25
    cla_straight_m2: 2.5
    cla_corner_m2: 4.2
    power_kw: 740
    ers_efficiency: 0.68
    tyre_deg_factor: 0.96
    dirty_air_sensitivity: 0.18
    strength: ["cornering", "stability"]
    weakness: ["top_speed", "energy_recovery"]

  energy_efficient:
    description: Optimized for ERS recovery and deployment
    mass_kg: 765
    cda_straight_m2: 0.88
    cda_corner_m2: 1.18
    cla_straight_m2: 2.2
    cla_corner_m2: 3.7
    power_kw: 730
    ers_efficiency: 0.85
    tyre_deg_factor: 1.00
    dirty_air_sensitivity: 0.15
