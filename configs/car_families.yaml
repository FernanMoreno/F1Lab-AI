    weakness: ["peak_power", "aero_efficiency"]

  tyre_whisperer:
    description: Gentle on tyres, sustainable race pace
    mass_kg: 772
    cda_straight_m2: 0.92
    cda_corner_m2: 1.22
    cla_straight_m2: 2.3
    cla_corner_m2: 3.9
    power_kw: 725
    ers_efficiency: 0.72
    tyre_deg_factor: 0.85
    dirty_air_sensitivity: 0.14
    strength: ["tyre_conservation", "sustainable_pace"]
    weakness: ["qualifying_pace", "attack_mode"]

  dirty_air_resistant:
    description: Performs well in dirty air, good for races
    mass_kg: 769
    cda_straight_m2: 0.90
    cda_corner_m2: 1.20
    cla_straight_m2: 2.4
    cla_corner_m2: 4.0
    power_kw: 735
    ers_efficiency: 0.74
    tyre_deg_factor: 0.98
    dirty_air_sensitivity: 0.08
