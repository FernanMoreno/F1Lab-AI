    weakness: ["clean_air_pace", "overtaking"]

  qualifying_specialist:
    description: Optimized for single-lap qualifying pace
    mass_kg: 760
    cda_straight_m2: 0.85
    cda_corner_m2: 1.15
    cla_straight_m2: 2.0
    cla_corner_m2: 3.4
    power_kw: 760
    ers_efficiency: 0.65
    tyre_deg_factor: 1.15
    dirty_air_sensitivity: 0.16
    strength: ["qualifying", "peak_performance"]
    weakness: ["race_pace", "tyre_conservation"]

  race_pace_concept:
    description: Balanced for race pace over qualifying
    mass_kg: 771
    cda_straight_m2: 0.89
    cda_corner_m2: 1.19
    cla_straight_m2: 2.25
    cla_corner_m2: 3.8
    power_kw: 728
    ers_efficiency: 0.78
    tyre_deg_factor: 0.92
    dirty_air_sensitivity: 0.12
    strength: ["race_pace", "consistent_laps"]
    weakness: ["qualifying", "max_performance"]

  boost_dependent:
    description: Heavily relies on ERS boost for pace
    mass_kg: 763
    cda_straight_m2: 0.86
    cda_corner_m2: 1.16
    cla_straight_m2: 2.15
    cla_corner_m2: 3.6
    power_kw: 700
    ers_efficiency: 0.90
    tyre_deg_factor: 1.02
    dirty_air_sensitivity: 0.14
    strength: ["boost_pace", "energy_management"]
    weakness: ["base_power", "low_battery_situations"]

defaults:
  brake_bias_range: [54, 58]  # percent rear
  power_unit_modes: ["qualifying", "race", "push", "manage"]
  ers_modes: ["boost", "hybrid", "charge", "off"]
  active_aero_modes: ["straight", "corner", "drs"]