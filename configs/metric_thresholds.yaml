# Metric Thresholds for Regulation Health Assessment
# These define when a metric indicates a problem

thresholds:
  battery_dependency_index:
    description: |
      Measures how much lap/race performance depends on electrical energy state.
      High values suggest racing becomes overly energy-managed.
    unit: ratio
    min: 0.0
    max: 1.0
    warning: 0.30
    critical: 0.40
    failure: 0.50
    interpretation:
      - "< 0.20: Healthy energy balance"
      - "0.20-0.30: Moderate battery influence"
      - "0.30-0.40: High battery dependency"
      - "> 0.40: Critical - racing becoming energy lottery"

  artificial_pass_index:
    description: |
      Measures the share of overtakes primarily caused by temporary energy
      advantage rather than durable pace, tyre, or positioning.
    unit: ratio
    min: 0.0
    max: 1.0
    warning: 0.35
    critical: 0.45
    failure: 0.50
    interpretation:
      - "< 0.25: Natural overtaking with some energy influence"
      - "0.25-0.35: Noticeable artificial component"
      - "0.35-0.45: Significant artificial overtaking"
      - "> 0.45: Critical - overtakes feel fake"

  dangerous_closing_speed_index:
    description: |
      Measures how often closing speed exceeds safety threshold before
      braking zones. High values suggest unsafe race dynamics.
    unit: ratio
    min: 0.0
    max: 1.0
    warning: 0.02
    critical: 0.04
    failure: 0.05
    interpretation:
      - "< 0.01: Safe closing speeds"
      - "0.01-0.02: Occasional high closing speeds"
      - "0.02-0.04: Dangerous closing speeds"
      - "> 0.04: Critical - safety concern"

  train_formation_index:
    description: |
      Measures how often cars remain within attacking distance but cannot
      realistically overtake. High values suggest processional racing.
    unit: ratio
    min: 0.0
    max: 1.0
    warning: 0.25
    critical: 0.35
    failure: 0.40
    interpretation:
      - "< 0.15: Good overtaking opportunities"
      - "0.15-0.25: Some train formation"
      - "0.25-0.35: Significant train formation"
      - "> 0.35: Critical - processional racing"

  dominant_architecture_risk:
    description: |
      Measures whether one synthetic car family dominates across
      circuits and conditions. High values suggest regulation bias.
    unit: ratio
    min: 0.0
    max: 1.0
    warning: 0.40
    critical: 0.50
    failure: 0.60
    interpretation:
      - "< 0.35: Balanced regulation"
      - "0.35-0.45: One architecture gaining advantage"
      - "0.45-0.55: Clear dominant architecture"
      - "> 0.55: Critical - regulation needs redesign"

  regulation_robustness_score:
    description: |
      Overall measure of regulation health across sampled scenarios.
      High scores indicate regulations work across diverse conditions.
    unit: score
    min: 0.0
    max: 1.0
    warning: 0.60
    critical: 0.50
    failure: 0.40
    inverse_threshold: true  # Lower is worse
    interpretation:
      - "> 0.75: Excellent robustness"
      - "0.60-0.75: Good robustness"
      - "0.50-0.60: Marginal - needs attention"
      - "< 0.50: Critical - regulation flawed"

  dirty_air_penalty:
    description: |
      Quantifies the performance loss when following another car.
      High values suggest aerodynamically sensitive regulation.
    unit: seconds_per_lap
    min: 0.0
    max: 5.0
    warning: 0.5
    critical: 1.0
    failure: 1.5
    interpretation:
      - "< 0.3: Cars can follow closely"
      - "0.3-0.5: Moderate dirty air effect"
      - "0.5-1.0: Significant dirty air penalty"
      - "> 1.0: Critical - racing impossible in dirty air"

  energy_delta_at_pass:
    description: |
      Energy state difference between overtaker and defender at pass point.
      Measures if passes require energy advantage.
    unit: megajoules
    min: -10.0
    max: 10.0
    warning: 1.5
    critical: 2.5
    failure: 3.0
    interpretation:
      - "< 0.5: Passes not energy-dependent"
      - "0.5-1.5: Some energy influence"
      - "1.5-2.5: Significant energy required"
      - "> 2.5: Critical - energy determines overtakes"

defaults:
  sample_size: 1000
  confidence_level: 0.95
  circuit_samples: ["monza", "monaco", "baku", "barcelona"]
  condition_samples: ["dry", "warm", "cold"]